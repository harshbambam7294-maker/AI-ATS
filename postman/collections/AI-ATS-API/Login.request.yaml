$kind: http-request
name: Login
method: POST
url: 'http://localhost:5000/api/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{email}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.token) {
          pm.collectionVariables.set("authToken", res.token);
      }
